name: linux - long test - amd64
on:
  push:
    branches:
      - 'updates'
    paths:
      - 'action.yml'
      - 'dragonfly.yml'
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.22.x
      id: go

    - name: Build go from tip
      uses: iwdgo/gotip-build@master
      id: gotip
      with:
        go_variables: GO_TEST_SHORT=1 GO_TEST_TIMEOUT_SCALE=8
        test_build: true
