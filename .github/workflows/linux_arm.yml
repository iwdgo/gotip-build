name: arm v5/6/7
on:
  push:
    branches:
      - 'updates'
    paths:
      - 'action.yml'
      - '.github/workflows/linux_arm.yml'

jobs:

  build:
    strategy:
      matrix:
        go_arch: [arm]
        go_arm: [5, 6]
      fail-fast: false
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.22.x
      id: go

    - name: Build go from tip
      uses: iwdgo/gotip-build@master
      id: gotip
      with:
        go_variables: GOARCH=${{ matrix.go_arch }} GOARM=${{ matrix.go_arm}}
        test_build: true
